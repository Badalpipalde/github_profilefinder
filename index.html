<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Profile Finder</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans">

  <!-- Container -->
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-2xl">

      <!-- Header -->
      <div class="mb-8 text-center">
        <h1 class="text-3xl font-semibold tracking-tight">GitHub Profile Finder</h1>
        <p class="text-gray-400 mt-2">Search for any GitHub user</p>
      </div>

      <!-- Search Bar -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl shadow-lg p-4 flex items-center gap-3">
        <input 
          type="text" 
          placeholder="Enter GitHub username..." 
          class="usernameinp flex-1 bg-transparent outline-none text-gray-200 placeholder-gray-500"
        />
        <button class="Search bg-indigo-600 hover:bg-indigo-500 transition px-5 py-2 rounded-lg font-medium">
          Search
        </button>
      </div>

      <!-- Profile Card -->
      <div class="card mt-8 bg-gray-900 border border-gray-800 rounded-xl shadow-lg p-6">

        
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
